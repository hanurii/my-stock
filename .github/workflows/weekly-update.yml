name: Weekly Update (CPI/GDP + 장기 월봉)

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    # 주말 데이터(CPI/GDP 발표, 월봉 마감)가 반영된 뒤 수집
    - cron: '0 0 * * 1'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  weekly-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: CPI/GDP 자동 수집
        run: npx tsx scripts/collect-cpi-gdp.ts
        continue-on-error: true

      - name: 장기 월봉 차트 증분 업데이트
        run: npx tsx scripts/update-longterm-charts.ts
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if ! git diff --staged --quiet; then
            KST_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
            git commit -m "chore: 주간 업데이트 ${KST_DATE} (CPI/GDP + 장기차트)"
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
