name: Monitor Research Sell Triggers

on:
  schedule:
    # 평일 08:00 KST = 23:00 UTC (전일, 일~목)
    - cron: '0 23 * * 0-4'
    # 평일 17:00 KST = 08:00 UTC (월~금)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor script (all configured stocks)
        run: npx tsx scripts/monitor-research.ts
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/research/monitor/*.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: research 모니터 자동 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
