name: Monitor Research Triggers (Sell + Entry)

on:
  schedule:
    # 평일 08:00 KST = 23:00 UTC (전일, 일~목)
    - cron: '0 23 * * 0-4'
    # 평일 12:00 KST = 03:00 UTC (월~금)
    - cron: '0 3 * * 1-5'
    # 평일 15:00 KST = 06:00 UTC (월~금)
    - cron: '0 6 * * 1-5'
    # 평일 18:00 KST = 09:00 UTC (월~금)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sell-trigger monitor (holding/watching stocks)
        run: npx tsx scripts/monitor-research.ts
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        continue-on-error: true

      - name: Run entry-trigger monitor (interested stocks)
        run: npx tsx scripts/monitor-entry.ts
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p public/data/research/monitor public/data/research/monitor_entry
          git add public/data/research/monitor public/data/research/monitor_entry
          if ! git diff --staged --quiet; then
            git commit -m "chore: research 모니터 자동 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase --autostash origin master
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
