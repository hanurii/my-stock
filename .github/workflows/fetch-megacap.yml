name: Fetch Mega-cap Quality Stocks Monitor

on:
  schedule:
    # 평일 17:30 KST = 08:30 UTC (한국 장 마감 + 30분)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-megacap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch megacap monitor data
        run: npx tsx scripts/fetch-megacap-monitor.ts
        continue-on-error: true

      - name: Fetch megacap FX data
        run: npx tsx scripts/fetch-megacap-fx.ts
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/megacap-monitor.json public/data/megacap-fx.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: 메가캡 우량주 모니터 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
