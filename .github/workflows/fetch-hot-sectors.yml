name: Fetch Hot Sectors / Themes

on:
  schedule:
    # 평일 17:35 KST = 08:35 UTC (foreign-flow 17:30 직후)
    - cron: '35 8 * * 1-5'
    # 다음 영업일 09:05 KST = 00:05 UTC 재시도
    - cron: '5 0 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-hot-sectors:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch hot sectors / themes
        run: npx tsx scripts/fetch-hot-sectors.ts
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/hot-sectors.json public/data/hot-sectors-history.json public/data/hot-sectors-news-history.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: 핫 섹터/테마 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
