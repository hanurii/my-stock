name: Update Watchlist Scores

on:
  schedule:
    # 매일 06:30 KST = 21:30 UTC (전일)
    - cron: '30 21 * * *'
    # 매일 17:00 KST = 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update watchlist scores
        run: npx tsx scripts/update-watchlist-scores.ts
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/watchlist.json public/data/growth-watchlist.json public/data/oil-expert-watchlist.json public/data/journal.json public/data/growth-candidates.json public/data/shareholder-returns.json public/data/dividend-data.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: 워치리스트/오일전문가 시세 업데이트 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          else
            echo "변경 사항 없음 — 커밋 생략"
          fi
